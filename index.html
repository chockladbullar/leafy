<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Leafy">
    <title>Leafy</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Serif:wght@400;700&family=Plus+Jakarta+Sans:wght@400;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" rel="stylesheet" />
    
    <style>
        :root {
            --primary: #1b4332; --primary-light: #40916c; --primary-dim: #95d5b2; --primary-fixed: #d8f3dc;
            --secondary: #52796f; --surface: #f7f9f7; --surf-low: #edf2f0; --surf-c: #dae5e0;
            --on-surface: #1a1c16; --on-surf-v: #3f4944; --error: #ba1a1a;
            --water-blue: #0077b6; --fert-orange: #e67e22;
            --safe-top: env(safe-area-inset-top, 20px);
            --safe-bot: env(safe-area-inset-bottom, 20px);
            --grad-hydration: linear-gradient(135deg, #d8f3dc, #b7e4c7);
            --grad-collection: linear-gradient(135deg, #b7e4c7, #95d5b2);
        }

        html.dark-mode { 
            --primary: #95d5b2; --primary-light: #b7e4c7; --primary-fixed: #1b4332; --surface: #081c15; 
            --surf-low: #12291f; --surf-c: #2d6a4f; --on-surface: #d8f3dc; --on-surf-v: #95d5b2;
            --water-blue: #4db3ff; --fert-orange: #ffb347;
            --grad-hydration: linear-gradient(135deg, #1b4332, #081c15);
            --grad-collection: linear-gradient(135deg, #2d6a4f, #1b4332);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; -webkit-user-select: none; user-select: none; }
        body { font-family: 'Plus Jakarta Sans', sans-serif; background: var(--surface); color: var(--on-surface); position: fixed; width: 100%; height: 100%; overflow: hidden; transition: background 0.3s; }
        
        .mi { font-family: 'Material Symbols Outlined' !important; font-weight: normal; font-size: 24px; line-height: 1; display: inline-block; direction: ltr; -webkit-font-smoothing: antialiased; }

        /* --- LAYOUT --- */
        .scroll-container { position: absolute; inset: 0; overflow-y: auto; -webkit-overflow-scrolling: touch; }
        .page { display: none; min-height: 100%; padding-bottom: calc(var(--safe-bot) + 8rem); }
        .page.active { display: block; animation: fadeIn 0.35s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        .app-header { position: sticky; top: 0; z-index: 100; background: linear-gradient(to bottom, var(--primary-fixed), rgba(216, 243, 220, 0.85)); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px); border-bottom: 1px solid var(--surf-c); padding: calc(var(--safe-top) + 0.5rem) 1.5rem 0.75rem; }
        html.dark-mode .app-header { background: linear-gradient(to bottom, #1b4332, rgba(8, 28, 21, 0.85)); }

        /* --- UI COMPONENTS --- */
        .bottom-nav { position: fixed; bottom: 0; left: 0; right: 0; z-index: 1000; display: flex; justify-content: space-around; background: rgba(247, 249, 247, 0.9); backdrop-filter: blur(20px); border-top: 1px solid var(--surf-c); padding: 0.7rem 0.5rem calc(var(--safe-bot) + 0.5rem); }
        html.dark-mode .bottom-nav { background: rgba(8, 28, 21, 0.9); }

        .nav-item { display: flex; flex-direction: column; align-items: center; color: var(--secondary); opacity: 0.6; border: none; background: none; flex: 1; transition: 0.3s; }
        .nav-item.active { opacity: 1; color: var(--primary); }
        .nav-item .label { font-size: 9px; font-weight: 800; text-transform: uppercase; margin-top: 4px; }

        .stat-card { border-radius: 1.5rem; padding: 1.25rem; border: 1px solid rgba(0,0,0,0.05); }
        .stat-card.hydration { background: var(--grad-hydration); }
        .stat-card.collection { background: var(--grad-collection); }

        .plant-card { background: #fff; border-radius: 1.5rem; border: 1px solid var(--surf-c); overflow: hidden; cursor: pointer; transition: 0.2s; }
        html.dark-mode .plant-card { background: #1b4332; }

        .care-btn { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; border: 1.5px solid transparent; background: var(--surf-low); cursor: pointer; transition: 0.3s; }
        .active-water { background: var(--water-blue) !important; color: #fff !important; }
        .active-fert { background: var(--fert-orange) !important; color: #fff !important; }

        .leafy-toast { position: fixed; bottom: calc(var(--safe-bot) + 6.5rem); left: 50%; transform: translateX(-50%); background: var(--primary); color: #fff; padding: 0.8rem 1.5rem; border-radius: 99px; z-index: 3000; opacity: 0; transition: 0.3s; pointer-events: none; }
        .leafy-toast.show { opacity: 1; }

        /* Helpers */
        .flex { display: flex; } .items-center { align-items: center; } .justify-between { justify-content: space-between; }
        .mt3 { margin-top: 1.5rem; } .mb3 { margin-bottom: 1.5rem; } .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: 1rem; }
        .small { font-size: 0.85rem; } .uppercase { text-transform: uppercase; font-weight: 800; }
    </style>
</head>
<body>

    <div id="leafy-toast" class="leafy-toast"></div>

    <div class="scroll-container" id="main-scroll">
        <div id="page-sanctuary" class="page active">
            <header class="app-header">
                <div style="text-align:center;"><h1>Leafy</h1><span class="uppercase small" id="loc-label" style="color:var(--primary-light)">Sanctuary</span></div>
            </header>
            <div style="padding: 1.5rem; max-width: 600px; margin: 0 auto;">
                <h2 id="welcome-text" style="font-size: 2.2rem; color: var(--primary); margin-bottom: 1rem;">Good morning</h2>
                
                <div class="grid2 mb3">
                    <div class="stat-card hydration"><span class="small uppercase">Hydration</span><div id="stat-hydration" style="font-size:2.5rem; font-family:'Noto Serif';">100%</div></div>
                    <div class="stat-card collection"><span class="small uppercase">Plants</span><div id="stat-total" style="font-size:2.5rem; font-family:'Noto Serif';">0</div></div>
                </div>

                <div id="plant-grid" style="display:grid; grid-template-columns:repeat(auto-fill, minmax(160px, 1fr)); gap:1.25rem;"></div>
            </div>
        </div>
    </div>

    <nav class="bottom-nav">
        <button class="nav-item active" onclick="showPage('sanctuary')" id="nav-sanctuary"><span class="mi">potted_plant</span><span class="label">Home</span></button>
        <button class="nav-item" onclick="showPage('settings')" id="nav-settings"><span class="mi">settings</span><span class="label">Settings</span></button>
    </nav>

    <script>
        const DB = {
            key: 'leafy_fix_v1',
            data: { plants: [], settings: { mode: 'auto' } },
            init() {
                const saved = localStorage.getItem(this.key);
                if (saved) this.data = JSON.parse(saved);
                this.apply();
            },
            save() { localStorage.setItem(this.key, JSON.stringify(this.data)); render(); },
            apply() {
                const isDark = this.data.settings.mode === 'dark' || (this.data.settings.mode === 'auto' && window.matchMedia('(prefers-color-scheme: dark)').matches);
                document.documentElement.classList.toggle('dark-mode', isDark);
            }
        };

        function showPage(id) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
            const target = document.getElementById('page-' + id);
            if(target) target.classList.add('active');
        }

        function showToast(m) {
            const t = document.getElementById('leafy-toast');
            t.innerText = m; t.classList.add('show');
            setTimeout(() => t.classList.remove('show'), 2500);
        }

        function render() {
            const grid = document.getElementById('plant-grid');
            if(!grid) return;
            grid.innerHTML = this.data.plants.length === 0 ? '<p style="text-align:center; width:100%; padding:2rem; opacity:0.5;">Add some plants to get started!</p>' : '';
            document.getElementById('stat-total').innerText = this.data.plants.length;
        }

        window.onload = () => {
            DB.init();
            render();
            const hr = new Date().getHours();
            document.getElementById('welcome-text').innerText = hr < 12 ? 'Good morning' : hr < 18 ? 'Good afternoon' : 'Good evening';
        };
    </script>
</body>
</html>
